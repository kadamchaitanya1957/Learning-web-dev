<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="stylegame.css">
</head>

<body>
  <h1 id="heading">Simon Game</h1>
  <button class="main">Start</button>
  <h2>Press any key to start the game</h2>
  <div class="game">
    <div class="one">
      <div  type="button" class="red button"></div>
      <div  type="button" class="green button"></div>
    </div>
    <div class="two">
      <div type="button" class="blue button"></div>
      <div type="button" class="yellow button"></div>
    </div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
